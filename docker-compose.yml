services:
  diwanic-ui:
    build: .
    ports:
      - "7860:7860"
    environment:
      - DATABASE__URL=${DATABASE__URL}
      - QDRANT__URL=http://qdrant:6333
      - QDRANT__API_KEY=${QDRANT__API_KEY}
      - ROUTER__BASE_URL=${ROUTER__BASE_URL}
      - ROUTER__API_KEY=${ROUTER__API_KEY}
      - ROUTER__MODEL=${ROUTER__MODEL}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      qdrant:
        condition: service_started
    command: >
      bash -c "python scripts/wait_for_qdrant.py && python run.py"

  diwanic-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE__URL=${DATABASE__URL}
      - QDRANT__URL=http://qdrant:6333
      - QDRANT__API_KEY=${QDRANT__API_KEY}
      - ROUTER__BASE_URL=${ROUTER__BASE_URL}
      - ROUTER__API_KEY=${ROUTER__API_KEY}
      - ROUTER__MODEL=${ROUTER__MODEL}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      qdrant:
        condition: service_started
    command: >
      bash -c "python scripts/wait_for_qdrant.py && python run_api.py"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
