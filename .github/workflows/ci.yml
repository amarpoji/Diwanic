name: Diwanic CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Lint with ruff
      run: |
        ruff check .
        
    - name: Run unit tests with pytest
      env:
        DATABASE__URL: ${{ secrets.DATABASE__URL }}
        QDRANT__URL: ${{ secrets.QDRANT__URL }}
        QDRANT__API_KEY: ${{ secrets.QDRANT__API_KEY }}
        ROUTER__BASE_URL: ${{ secrets.ROUTER__BASE_URL }}
        ROUTER__API_KEY: ${{ secrets.ROUTER__API_KEY }}
      run: |
        pytest
        
    - name: Run RAG Evaluation
      env:
        DATABASE__URL: ${{ secrets.DATABASE__URL }}
        QDRANT__URL: ${{ secrets.QDRANT__URL }}
        QDRANT__API_KEY: ${{ secrets.QDRANT__API_KEY }}
        ROUTER__BASE_URL: ${{ secrets.ROUTER__BASE_URL }}
        ROUTER__API_KEY: ${{ secrets.ROUTER__API_KEY }}
      run: |
        python diwanic/search/evaluation.py
