name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run tests
        run: pytest tests/ --disable-warnings
        env:
          DATABASE__URL: "sqlite:///:memory:"
          QDRANT__URL: "http://localhost:6333"
          QDRANT__API_KEY: "dummy"
          ROUTER__BASE_URL: "http://localhost:8000"
          ROUTER__API_KEY: "dummy"
          LOGFIRE_DISABLED: 1

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t diwanic:latest .
